version: "3.9"

services:
  stock-bot:
    build: .
    container_name: telegram-stock-bot
    restart: unless-stopped

    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-300}
      - DB_PATH=/app/data/stock_alerts.db

    volumes:
      - bot-data:/app/data   # SQLite DB persists across restarts

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
